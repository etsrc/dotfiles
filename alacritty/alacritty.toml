[window]
padding = { x = 12, y = 12 }
# decorations = "None"          # Removes title bar (you can still drag with Alt+click)
opacity = 0.90
dynamic_padding = true
startup_mode = "Maximized"

[env]
TERM = "xterm-256color"

[font]
normal = { family = "Fira Code", style = "Regular" }
bold = { family = "Fira Code", style = "Bold" }
italic = { family = "Fira Code", style = "Italic" }
size = 13.0

# Ligatures (for pretty code like => -> !=)
builtin_box_drawing = true

[cursor]
style = { shape = "Beam", blinking = "On" }
# vi_mode_cursor = { shape = "Block" }

[mouse]
hide_when_typing = true

[general]
live_config_reload = true
# ~/.config/alacritty/alacritty.toml

import = [
  # uncomment the flavour you want below:
  # "~/.config/alacritty/themes/catppuccin-latte.toml"
  # "~/.config/alacritty/themes/catppuccin-frappe.toml"
  # "~/.config/alacritty/themes/catppuccin-macchiato.toml"
  "~/.config/alacritty/themes/catppuccin-mocha.toml"
]