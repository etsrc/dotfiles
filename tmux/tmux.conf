# Set default terminal to support true colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Status bar customization
# set -g status-position top
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'  # Catppuccin Mocha colors

set -g status-left-length 20
set -g status-left '#[fg=#89b4fa,bold] #S #[fg=#cdd6f4]• '
# set -g status-right '#[fg=#f38ba8] %Y-%m-%d #[fg=#89b4fa] %H:%M '
set -g status-right ""

set -g window-status-current-style 'fg=#f9e2af,bold bg=#313244'
set -g window-status-current-format ' #I #W#{?window_zoomed_flag, 󰊓 , }'
set -g window-status-style 'fg=#cdd6f4'
set -g window-status-format ' #I #W '

set -g pane-border-style 'fg=#6c7086'
set -g pane-active-border-style 'fg=#89b4fa'

# Message style
set -g message-style 'fg=#f9e2af bg=#313244'

# Copy mode vi bindings
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

